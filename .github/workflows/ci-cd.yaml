name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci-cd.yaml'

permissions:
  contents: write
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package.json

      - name: Install deps
        working-directory: app
        run: npm install

      - name: Lint (ESLint)
        working-directory: app
        run: npm run lint

      - name: Format check (Prettier)
        working-directory: app
        run: npm run format:check

      - name: Run tests
        working-directory: app
        run: npm test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: app
          scanners: secret
          format: sarif
          output: trivy-secret.sarif
          exit-code: '1'

      - name: Upload secret scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-secret.sarif

  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  build-scan-push:
    needs: [lint-format-test, secret-scan, sast]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: app
          push: false
          load: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.image.outputs.name }}:${{ github.sha }}
          scanners: vuln
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload vulnerability scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.image.outputs.name }}:${{ github.sha }}
          format: cyclonedx
          output: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json

      - name: Push image
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ github.sha }}
          docker push ${{ steps.image.outputs.name }}:latest

      - name: Update image tag in manifests
        working-directory: manifests
        run: |
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          ./kustomize edit set image sample-app=${{ steps.image.outputs.name }}:${{ github.sha }}
          rm -f kustomize kustomize.tar.gz

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add manifests/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: deploy ${{ github.sha }}"
            git rebase origin/main
            git push origin main
          fi
