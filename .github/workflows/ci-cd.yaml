name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/ci-cd.yaml'

permissions:
  contents: write
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/backend/package.json

      - name: Install deps
        working-directory: services/backend
        run: npm install

      - name: Lint (ESLint)
        working-directory: services/backend
        run: npm run lint

      - name: Format check (Prettier)
        working-directory: services/backend
        run: npm run format:check

      - name: Run tests
        working-directory: services/backend
        run: npm test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: services
          scanners: secret
          format: sarif
          output: trivy-secret.sarif
          exit-code: '1'

      - name: Upload secret scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-secret.sarif

  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  build-scan-push:
    needs: [lint-format-test, secret-scan, sast]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Build, scan, and push service images
        run: |
          set -e
          IMAGE_BASE=$(echo "${REGISTRY}/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          mkdir -p sarif sbom

          for svc in db backend frontend; do
            image="${IMAGE_BASE}-${svc}"
            echo "== Building ${svc} =="
            docker build -t "${image}:${GITHUB_SHA}" -t "${image}:latest" "services/${svc}"

            echo "== Scanning ${svc} for vulnerabilities =="
            trivy image --scanners vuln --severity CRITICAL,HIGH --format sarif \
              --output "sarif/${svc}.sarif" --exit-code 0 "${image}:${GITHUB_SHA}"

            echo "== Generating SBOM for ${svc} =="
            trivy image --format cyclonedx --output "sbom/${svc}.cyclonedx.json" "${image}:${GITHUB_SHA}"

            echo "== Pushing ${svc} =="
            docker push "${image}:${GITHUB_SHA}"
            docker push "${image}:latest"
          done

      - name: Upload vulnerability scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom

      - name: Update image tags in manifests
        working-directory: manifests
        run: |
          IMAGE_BASE=$(echo "${REGISTRY}/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          ./kustomize edit set image todolist-db="${IMAGE_BASE}-db:${GITHUB_SHA}"
          ./kustomize edit set image todolist-backend="${IMAGE_BASE}-backend:${GITHUB_SHA}"
          ./kustomize edit set image todolist-frontend="${IMAGE_BASE}-frontend:${GITHUB_SHA}"
          rm -f kustomize kustomize.tar.gz

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add manifests/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: deploy ${GITHUB_SHA}"
            git rebase origin/main
            git push origin main
          fi
