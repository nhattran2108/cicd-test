name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci-cd.yaml'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package.json

      - name: Install deps
        working-directory: app
        run: npm install

      - name: Run tests
        working-directory: app
        run: npm test

      - name: Compute lowercase image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

      - name: Update image tag in manifests
        working-directory: manifests
        run: |
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          ./kustomize edit set image sample-app=${{ steps.image.outputs.name }}:${{ github.sha }}
          rm -f kustomize kustomize.tar.gz

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: deploy ${{ github.sha }}"
            git push
          fi
